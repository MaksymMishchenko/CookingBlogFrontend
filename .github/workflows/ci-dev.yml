name: CI for Dev Branch

on:
  pull_request:
    branches: [ dev ]

defaults:
  run:
    working-directory: CookingBlogFrontend

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'        
          cache-dependency-path: CookingBlogFrontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:          
          working-directory: CookingBlogFrontend
          start: npm start
          wait-on: 'http://localhost:4200'          
          project: .