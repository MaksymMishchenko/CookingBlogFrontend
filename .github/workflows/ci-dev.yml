name: CI for Dev Branch

on:
  pull_request:
    branches: [ dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'         
          cache-dependency-path: CookingBlogFrontend/package-lock.json

      - name: Install dependencies       
        run: npm ci
        working-directory: CookingBlogFrontend

      - name: Build
        run: npm run build
        working-directory: CookingBlogFrontend

      - name: Unit Tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: CookingBlogFrontend

      - name: Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:          
          working-directory: CookingBlogFrontend          
          config-file: cypress.config.ts 
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 300