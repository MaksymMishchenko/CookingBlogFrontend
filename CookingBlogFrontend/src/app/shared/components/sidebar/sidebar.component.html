<aside class="sidebar">
  <div class="menu-title centered" 
       [style.cursor]="cursorStyle()"
       (click)="toggleMenu()">
    Recipes
    <span class="arrow" [class.rotate]="isMenuOpen()">&#9660;</span>
  </div>
  
  <ul class="sidebar-menu" [class.show]="isMenuOpen()">
    <li>
      <a routerLink="/" 
         routerLinkActive="active-link" 
         [routerLinkActiveOptions]="{exact: true}"
         (click)="closeMenu()">
        All Recipes
      </a>
    </li>

    @for (category of categories(); track category.id) {
      <li>
        <a [routerLink]="['/category', category.slug]" 
           routerLinkActive="active-link"
           (click)="closeMenu()">
          {{ category.name }}
        </a>
      </li>
    } @empty {
      <li class="loading-placeholder">Loading categories...</li>
    }
  </ul>
</aside>
