<div class="comment">
    <div class="comment-image-container">
        <img src="/assets/user-icon.png" alt="user avatar" />
    </div>

    <div class="comment-right-part">
        <div class="comment-content">
            <div class="comment-author">{{comment().author}}</div>
        </div>

        @if(!isEditing()){
            <div class="comment-text" [innerHtml]="comment().content"></div>
        }

        <div class="comment-actions">
            @if(canReply()){
                <div class="comment-action reply"
                    (click)="setActiveComment.emit({id: comment().id, type: activeCommentType.replying })">Reply</div>
            }

            @if(canEdit()){
                <div class="comment-action edit"
                    (click)="setActiveComment.emit({id: comment().id, type: activeCommentType.editing })">Edit</div>
            }

            @if(canDelete()){
                <div class="comment-action delete" (click)="deleteComment.emit(comment().id)">Delete</div>
            }
        </div>

        @if(isEditing()){
            <comment-form submitLabel="Update"
            [hasCancelButton]="true"
            [initialText]="comment().content"
            (handleSubmit)="updateComment.emit({content: $event, commentId: comment().id })"
            (handleCancel)="setActiveComment.emit(null)"
            >
            </comment-form>
        }

        @if(isReplying()){
            <comment-form submitLabel="Reply"
                (handleSubmit)="addComment.emit({
                    content: $event,
                    parentId: replyId(),
                    replyToName: comment().author                                     
                     })">
            </comment-form>
            <!-- replyTo: comment().author -->
        }

        @if(replies().length > 0){
            <div class="replies">
                @for(reply of replies(); track reply.id){
                    <comment 
                        [comment]="reply" 
                        (setActiveComment)="setActiveComment.emit($event)"
                        [activeComment]="activeComment()" 
                        (addComment)="addComment.emit($event)"
                        (updateComment)="updateComment.emit($event)"
                        [parentId]="comment().id"
                        [replies]="[]" 
                        [currentUserId]="currentUserId()"
                        (deleteComment)="deleteComment.emit($event)">
                    </comment>
                }
            </div>
        }
    </div>
</div>
