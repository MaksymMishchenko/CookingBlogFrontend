<div class="post">
    <div class="header">
        <h2 [routerLink]="['/', post.categorySlug, post.slug]">
            {{ post.title }}
        </h2>
    </div>

    <div class="info">
        <small>Author: {{post.author}}</small>
        <small>Date: {{post.createdAt | date: 'dd.MM.yy'}}</small>
        <small>Comments: {{post.commentsCount}}</small>
    </div>

    <div class="media">
        <img class="img" src="/images/img.jpeg" alt="img">
        <p>{{post.description}}</p>
    </div>
</div>
