<div class="search-container">
    <div class="search-input-wrapper">
        <div class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>

        <input type="text" [formControl]="searchControl" placeholder="Search articles..." class="search-input"
            (focus)="showDropdown = true" autocomplete="off">

        <div *ngIf="searchControl.value" class="clear-button" (click)="clearSearch()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>

        <div *ngIf="isLoading" class="loading-spinner">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Dropdown з результатами -->
    <div *ngIf="showDropdown && searchControl.value && searchControl.value.length > 1" class="search-dropdown"
        (click)="preventClose($event)">
        <!-- Завантаження -->
        <div *ngIf="isLoading" class="dropdown-loading">
            <div class="spinner-small"></div>
            <span>Search...</span>
        </div>

        <!-- Результати -->
        <div *ngIf="!isLoading && searchResults.length > 0" class="results-container">
            <div class="results-header">
                <span>Founded articles ({{ searchResults.length }})</span>
            </div>

            <div class="results-list">
                <a *ngFor="let result of searchResults" [routerLink]="result.url" class="result-item"
                    (click)="selectResult(result)">
                    <div class="result-title">{{ result.title }}</div>
                    <div class="result-description">{{ result.description }}</div>
                    <div *ngIf="result.category" class="result-category">
                        {{ result.category }}
                    </div>
                </a>
            </div>

            <div class="results-footer">
                <a *ngIf="searchResults.length > 0" class="view-all">
                    Show all results →
                </a>
            </div>
        </div>

        <!-- Немає результатів -->
        <div *ngIf="!isLoading && noResults" class="no-results">
            <div class="no-results-icon">🔍</div>
            <div class="no-results-text">
                <h4>No results found</h4>
                <p>Try using different keywords</p>
            </div>
        </div>
    </div>
</div>
